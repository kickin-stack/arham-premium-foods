<!DOCTYPE html>
<html>
<head>
  <title>Arham Premium Foods</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }
    header {
      background: #2e7d32;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .products {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 20px;
    }
    .product {
      background: white;
      margin: 10px;
      padding: 15px;
      width: 200px;
      border-radius: 10px;
      text-align: center;
    }
    button {
      background: #2e7d32;
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h1>Arham Premium Foods</h1>
  <p>Fresh • Organic • Trusted</p>
</header>

<div class="products">

  <div class="product">
    <h3>Organic Honey</h3>
    <p>$10</p>
    <button>Buy Now</button>
  </div>

  <div class="product">
    <h3>Dry Fruits</h3>
    <p>$15</p>
    <button>Buy Now</button>
  </div>

  <div class="product">
    <h3>Herbal Tea</h3>
    <p>$8</p>
    <button>Buy Now</button>
  </div>

</div>

</body>
</html>
